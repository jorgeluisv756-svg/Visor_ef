<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Consulta de Datos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
        }

        /* ENCABEZADO */

        .header {
            background: #f4f4f4;
            padding: 10px;
            text-align: center;
        }

        .header img {
            width: 320px;
            display: block;
            max-width: 90%;
            margin: auto;
        }

        /* CONTENEDOR */

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 5px;
            padding-top: 0;
            margin-bottom: 5px;
        }

        h1 {
            margin-bottom: 5px;
        }

        /* SELECTORES */

        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* TABLA */

        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        .center {
            text-align: center;
        }

        thead {
            background: rgba(98, 17, 50);
            color: white;
        }

        th,
        td {
            padding: 10px;
            border-bottom: none;
            text-align: left;
        }

        /* BARRA DE AVANCE */

        .avance-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .avance-texto {
            font-weight: 600;
            font-size: 13px;
            min-width: 35px;
            text-align: right;
        }

        .progress-bar {
            width: 80px;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: #4caf50;
            border-radius: 5px;
        }

        /* Boton de descarga reporte*/
        #btnDescargar {

            position: fixed;
            bottom: 40px;
            right: 20px;
            background: #8b2d2d;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;

            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);

        }

        #btnDescargar:hover {
            background: #6e2222;
        }

        /* RESPONSIVE */

        @media(max-width:768px) {

            .header img {
                height: 50px;
            }

        }
    </style>

</head>


<body>

    <div class="header">

        <img class="logo"
            src="https://raw.githubusercontent.com/jorgeluisv756-svg/imagenes_kmz/7c7924c0d0c89c5adaf112d1b8e3fb9db3258400/Logotipo%20armas30%20(1).png">

    </div>

    <div id="reporteExportar" style="padding-top:25px;">

        <div id="encabezadoReporte" style="display:none;text-align:center;margin-bottom:20px;">

            <img src="https://raw.githubusercontent.com/jorgeluisv756-svg/imagenes_kmz/7c7924c0d0c89c5adaf112d1b8e3fb9db3258400/Logotipo%20armas30%20(1).png"
                id="logoReporte" style="height:70px;"><br>

        </div>

        <div class="container">

            <div class="container">

                <h1>Consulta de Datos</h1>
                <p>Seleccione el área y el año fiscal correspondiente</p>
                <button id="btnDescargar">Descargar reporte</button>

                <!-- SELECTOR AREA -->
                <select id="areaSelect"></select>

                <!-- SELECTOR AÑO -->
                <select id="anioSelect"></select>

                <div class="table-container">

                    <table id="tablaProgramas">

                        <thead>
                            <tr>
                                <th rowspan="2" class="center">No.</th>
                                <th rowspan="2" class="center">Nombre del Programa</th>
                                <th colspan="3" class="center">Monto</th>
                                <th colspan="2" class="center">Beneficiarios</th>
                                <th rowspan="2" class="center">Estatus</th>
                            </tr>
                            <tr>
                                <th class="center">Programado</th>
                                <th class="center">Ejercido</th>
                                <th class="center">Avance</th>
                                <th class="center">Programados</th>
                                <th class="center">Totales</th>
                            </tr>
                        </thead>
                        <tbody></tbody>

                    </table>

                </div>
                <div id="pieReporte" style="display:none; text-align:center; margin-top:20px; font-size:15px;">

                    <b>Sistema de Información Económica</b><br>

                    <div id="datosReporte"></div>

                </div>

            </div>
        </div>


        <script>

            /* BASE DE DATOS EDITABLE */
            const datos = {

                "2026": {

                    "Agencia de Desarrollo Valle de Plata": [

                    ],

                    "Agencia Estatal de Energía": [
                        {
                            nombre: "Energía para el Bienestar",
                            montoprogramado: "$10,000,000",
                            montoejercido: "$620,000",
                            avance: 62,
                            beneficiariosprogramados: 35,
                            beneficiariosejercidos: 26,
                            estatus: "Vigente"
                        }

                    ],

                    "Coordinación de Administración y Planeación": [

                    ],

                    "Corporación de Fomento de Infraestructura Industrial": [

                    ],

                    "Instituto Hidalguense de Competitividad Empresarial": [

                    ],

                    "Subsecretaría de Fomento Económico": [
                        {
                            nombre: "Impulso Nafin por Hidalgo",
                            montoprogramado: "$734,445,920",
                            montoejercido: "$418,634,174",
                            avance: 57,
                            beneficiariosprogramados: 222,
                            beneficiariosejercidos: 150,
                            estatus: "Vigente"
                        },

                        {
                            nombre: "Transformando con la Juventud",
                            montoprogramado: "$20,000,000",
                            montoejercido: "-",
                            avance: 0,
                            beneficiariosprogramados: 470,
                            beneficiariosejercidos: "-",
                            estatus: "En evaluación"
                        }

                    ],

                    "Subsecretaría de Inversiones y Economía Sectorial": [

                    ]

                },

                "2025": {

                    "Agencia de Desarrollo Valle de Plata": [

                    ],

                    "Agencia Estatal de Energía": [

                    ],

                    "Coordinación de Administración y Planeación": [

                    ],

                    "Corporación de Fomento de Infraestructura Industrial": [

                    ],

                    "Instituto Hidalguense de Competitividad Empresarial": [

                    ],

                    "Subsecretaría de Fomento Económico": [

                    ],

                    "Subsecretaría de Inversiones y Economía Sectorial": [

                    ]
                },

                "2024": {

                    "Agencia de Desarrollo Valle de Plata": [

                    ],

                    "Agencia Estatal de Energía": [

                    ],

                    "Coordinación de Administración y Planeación": [

                    ],

                    "Corporación de Fomento de Infraestructura Industrial": [

                    ],

                    "Instituto Hidalguense de Competitividad Empresarial": [

                    ],

                    "Subsecretaría de Fomento Económico": [

                    ],

                    "Subsecretaría de Inversiones y Economía Sectorial": [

                    ]
                },

                "2023": {

                    "Agencia de Desarrollo Valle de Plata": [

                    ],

                    "Agencia Estatal de Energía": [

                    ],

                    "Coordinación de Administración y Planeación": [

                    ],

                    "Corporación de Fomento de Infraestructura Industrial": [

                    ],

                    "Instituto Hidalguense de Competitividad Empresarial": [

                    ],

                    "Subsecretaría de Fomento Económico": [

                    ],

                    "Subsecretaría de Inversiones y Economía Sectorial": [

                    ]
                }

            };


            /* SELECTORES */
            const anioSelect = document.getElementById("anioSelect");
            const areaSelect = document.getElementById("areaSelect");


            /* CARGAR AÑOS */
            anioSelect.innerHTML = "<option value='' selected disabled>Seleccione un año</option>";
            Object.keys(datos).forEach(anio => {
                let option = document.createElement("option");
                option.value = anio;
                option.textContent = anio;
                anioSelect.appendChild(option);
            });

            /* CARGAR ÁREAS (una sola vez, con todas las áreas posibles) */
            areaSelect.innerHTML = "<option value='' selected disabled>Seleccione un área</option>";
            areaSelect.innerHTML += "<option value='Secretaria'>Secretaría de Desarrollo Económico</option>";
            let todasAreas = new Set();
            Object.values(datos).forEach(anioData => {
                Object.keys(anioData).forEach(area => todasAreas.add(area));
            });

            todasAreas.forEach(area => {
                let option = document.createElement("option");
                option.value = area;
                option.textContent = area;
                areaSelect.appendChild(option);
            });

            /* EVENTOS */
            anioSelect.addEventListener("change", cargarProgramas);
            areaSelect.addEventListener("change", cargarProgramas);

            /* CARGAR PROGRAMAS */
            function cargarProgramas() {
                let anio = anioSelect.value;
                let area = areaSelect.value;
                const tbody = document.querySelector("#tablaProgramas tbody");
                tbody.innerHTML = "";

                let programas = datos[anio][area] || [];

                if (programas.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='9'>No hay registros</td></tr>";
                    return;
                }

                programas.forEach((programa, index) => {
                    let avanceHTML = "—";
                    if (programa.avance != null) {
                        avanceHTML = `
        <div class="avance-container">
          <span class="avance-texto">${programa.avance}%</span>
          <div class="progress-bar">
            <div class="progress" style="width:${programa.avance}%"></div>
          </div>
        </div>`;
                    }

                    let fila = `<tr>
      <td>${index + 1}</td>
      <td>${programa.nombre ?? "—"}</td>
      <td class="center">${programa.montoprogramado ?? "—"}</td>
      <td class="center">${programa.montoejercido ?? "—"}</td>
      <td>${avanceHTML}</td>
      <td class="center">${programa.beneficiariosprogramados ?? "—"}</td>
      <td class="center">${programa.beneficiariosejercidos ?? "—"}</td>
      <td>${programa.estatus ?? "—"}</td>
      </tr>`;

                    tbody.innerHTML += fila;
                });
            }

            /* Inicializar con valores por defecto */
            cargarProgramas();

            /*logica boton reporte*/
            document.getElementById("btnDescargar").addEventListener("click", function () {

                let boton = document.getElementById("btnDescargar");

                /* ocultar botón */
                boton.style.display = "none";

                let anio = document.getElementById("anioSelect").value;
                let area = document.getElementById("areaSelect").value;

                let hoy = new Date();
                let fecha = hoy.toLocaleDateString("es-MX", {
                    weekday: "long",
                    day: "numeric",
                    month: "long",
                    year: "numeric"
                });

                /* llenar encabezado */
                document.getElementById("datosReporte").innerHTML =
                    `Fecha de descarga: ${fecha}`;

                let pie = document.getElementById("pieReporte");
                pie.style.display = "block";

                let encabezado = document.getElementById("encabezadoReporte");
                encabezado.style.display = "block";

                html2canvas(document.getElementById("reporteExportar"), {
                    scale: 3,
                    useCORS: true
                }).then(canvas => {
                    const { jsPDF } = window.jspdf;
                    let pdf = new jsPDF("landscape", "mm", "letter");

                    let imgData = canvas.toDataURL("image/png");

                    // ancho y alto de la hoja carta en horizontal
                    let pageWidth = pdf.internal.pageSize.getWidth();
                    let pageHeight = pdf.internal.pageSize.getHeight();

                    // escalar imagen para que ocupe todo el ancho de la hoja
                    let imgWidth = pageWidth * 1.10; // zoom 110%
                    let imgHeight = canvas.height * imgWidth / canvas.width;

                    // centrar horizontalmente
                    let x = (pageWidth - imgWidth) / 2;
                    let y = 0; // margen superior fijo

                    pdf.addImage(imgData, "PNG", x, y, imgWidth, imgHeight);


                    let areaArchivo = area.replace(/\s/g, "_");
                    pdf.save(`Consulta_${anio}_${areaArchivo}.pdf`);

                    // restaurar visor
                    boton.style.display = "block";
                    encabezado.style.display = "none";
                    pie.style.display = "none";
                });
            });

            /* CARGAR PROGRAMAS */
            function cargarProgramas() {
                let anio = anioSelect.value;
                let area = areaSelect.value;

                const tbody = document.querySelector("#tablaProgramas tbody");
                tbody.innerHTML = "";

                if (!anio || !area) {
                    tbody.innerHTML = "<tr><td colspan='9'>Seleccione un año y un área</td></tr>";
                    return;
                }

                let programas = [];

                if (area === "Secretaria") {
                    // juntar todos los programas de todas las áreas del año
                    if (datos[anio]) {
                        Object.values(datos[anio]).forEach(lista => {
                            programas = programas.concat(lista);
                        });
                    }
                } else {
                    programas = datos[anio][area] || [];
                }

                if (programas.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='9'>No hay registros</td></tr>";
                    return;
                }

                programas.forEach((programa, index) => {
                    let avanceHTML = "—";
                    if (programa.avance != null) {
                        avanceHTML = `
                <div class="avance-container">
                  <span class="avance-texto">${programa.avance}%</span>
                  <div class="progress-bar">
                    <div class="progress" style="width:${programa.avance}%"></div>
                  </div>
                </div>`;
                    }

                    let fila = `<tr>
          <td>${index + 1}</td>
          <td>${programa.nombre ?? "—"}</td>
          <td class="center">${programa.montoprogramado ?? "—"}</td>
          <td class="center">${programa.montoejercido ?? "—"}</td>
          <td>${avanceHTML}</td>
          <td class="center">${programa.beneficiariosprogramados ?? "—"}</td>
          <td class="center">${programa.beneficiariosejercidos ?? "—"}</td>
          <td>${programa.estatus ?? "—"}</td>
        </tr>`;

                    tbody.innerHTML += fila;
                });
            }

            /* construir tabla */
            programas.forEach((programa, index) => {

                let avanceHTML = "—";

                if (programa.avance != null) {

                    avanceHTML = `
<div class="avance-container">

<span class="avance-texto">${programa.avance}%</span>

<div class="progress-bar">
<div class="progress" style="width:${programa.avance}%"></div>
</div>

</div>`;
                }

                let fila = `<tr>

<td>${index + 1}</td>

<td>${programa.nombre ?? "—"}</td>`;

                if (usarMontoProgramado) {
                    fila += `<td class="center">${programa.montoprogramado ?? "—"}</td>`;
                }

                if (usarMontoEjercido) {
                    fila += `<td class="center">${programa.montoejercido ?? "—"}</td>`;
                }

                if (usarAvance) {
                    fila += `<td>${avanceHTML}</td>`;
                }

                if (usarBenefProgramados) {
                    fila += `<td class="center">${programa.beneficiariosprogramados ?? "—"}</td>`;
                }

                if (usarBenefTotales) {
                    fila += `<td class="center">${programa.beneficiariosejercidos ?? "—"}</td>`;
                }

                fila += `<td>${programa.estatus ?? "—"}</td></tr>`;

                tbody.innerHTML += fila;

            });

            anioSelect.addEventListener("change", cargarAreas);

            areaSelect.addEventListener("change", cargarProgramas);

            cargarAreas();

        </script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>

</html>
