<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>Visualizador de Municipios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    #logo {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.7);
      padding: 5px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    #logo img {
      width: 360px;
      height: auto;
      display: block;
      max-width: 90vw;
    }

    #panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      font-family: Arial, sans-serif;
      font-size: 0.9em;
      width: 90vw;
      max-width: 270px;
      max-height: 400px;
      overflow-y: auto;
    }

    #panel h3 {
      margin-top: 0;
      font-size: 14px;
      text-align: center;
    }

    #menuOptions {
      display: none;
      margin-top: 8px;
    }

    #panel .botonera {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }


    #etiquetas-panel {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      font-family: Arial, sans-serif;
      font-size: 0.9em;
      width: 90vw;
      max-width: 180px;
    }

    #etiquetas-panel h3 {
      margin-top: 0;
      font-size: 14px;
      text-align: center;
    }

    #legend {
      margin-top: 10px;
      font-size: 14px;
      display: none;
    }

    #legend div {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      gap: 6px;
    }

    #legend span {
      display: inline-block;
      width: 20px;
      height: 20px;
      margin-right: 6px;
    }

    #legend strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .region-label,
    .mun-label {
      font-weight: bold;
      color: #000;
      background: none;
      border: none;
      text-align: center;
      box-shadow: none;
      text-shadow:
        1px 1px 2px #fff,
        -1px 1px 2px #fff,
        1px -1px 2px #fff,
        -1px -1px 2px #fff;
    }

    .region-label {
      font-size: 18px;
    }

    .mun-label {
      font-size: 10px;
      max-width: 140px;
      white-space: normal;
      word-wrap: break-word;
      text-align: center;
    }

    .empty-icon {
      background: none;
      border: none;
    }

    #simbolos-panel {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      font-family: Arial, sans-serif;
      font-size: 0.9em;
      width: 90vw;
      max-width: 220px;
      display: none;
    }

    #simbolos-panel h3 {
      margin-top: 0;
      font-size: 14px;
      text-align: center;
    }

    .simbolo {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .simbolo .box {
      width: 20px;
      height: 20px;
      margin-right: 6px;
      background: none;
      border: 2px solid;
    }

    @media (max-width: 600px) {
      #logo img {
        width: 200px;
      }

      #panel {
        max-width: 90vw;
        font-size: 0.85em;
      }

      #etiquetas-panel {
        right: 10px;
        bottom: 100px;
      }

      #simbolos-panel {
        left: 10px;
        bottom: 10px;
      }

      .region-label {
        font-size: 11px;
      }

      .mun-label {
        font-size: 9px;
        max-width: 120px;
      }

      .simbolo .box {
        width: 16px;
        height: 16px;
      }
    }
  </style>
</head>

<body>
  <div id="logo">
    <img
      src="https://raw.githubusercontent.com/jorgeluisv756-svg/imagenes_kmz/7c7924c0d0c89c5adaf112d1b8e3fb9db3258400/Logotipo%20armas30%20(1).png"
      alt="Logo Institucional">
  </div>

  <div id="panel">
    <h3>Selecciona un programa</h3>
    <button id="menuBtn">Abrir menú</button>
    <button id="downloadBtn" title="Descargar mapa en PDF" disabled style="padding: 4px; border-radius: 4px;">📥</button>
    <div id="menuOptions">
      <label><input type="radio" name="mapOption" value="NAFIN1"> Impulso NAFIN 2023</label><br>
      <label><input type="radio" name="mapOption" value="NAFIN2"> Impulso NAFIN 2024</label><br>
      <label><input type="radio" name="mapOption" value="NAFIN3"> Impulso NAFIN 2025</label><br>
      <label><input type="radio" name="mapOption" value="Paso1"> Emprendiendo Paso a Paso 2024</label><br>
      <label><input type="radio" name="mapOption" value="Paso2"> Emprendiendo Paso a Paso 2025</label>
    </div>
    <div id="legend"><strong>INVERSIÓN</strong></div>
    <div id="programTitle" style="margin-top: 6px; font-weight: bold; font-size: 13px; text-align: center;"></div>
  </div>

  <div id="etiquetas-panel">
    <h3>Selecciona etiquetas</h3>
    <label><input type="checkbox" id="toggleMunicipios" checked> Municipales</label><br>
    <label><input type="checkbox" id="toggleRegiones" checked> Regionales</label>
  </div>

  <div id="simbolos-panel">
    <h3>Simbología</h3>
    <div id="simbolos-content"></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Inicializar mapa y capa base
    var map = L.map('map', {
      zoomSnap: 0.1, 
      zoomDelta: 0.2 
    }).setView([20.50, -98.95], 8.9);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Pane de etiquetas
    map.createPane('labels');
    map.getPane('labels').style.zIndex = 650;
    map.getPane('labels').style.pointerEvents = 'none';

    // Capas y datos
    var municipiosLayer, regionesLayer, edoLayer;
    var NAFIN1Layer, NAFIN2Layer, NAFIN3Layer, Paso1Layer, Paso2Layer;
    var informesNAFINData,informesPasoData;
    var regionesLabelLayer = L.layerGroup([], { pane: 'labels' }).addTo(map);
    var municipiosLabelLayer = L.layerGroup([], { pane: 'labels' }).addTo(map);

    // Diccionario con coordenadas personalizadas
    const coordsPersonalizadas = {
      "San Agustín Tlaxiaca": [20.1160389, -98.924683],
      "Lolotla": [20.9302527, -98.730923],
      "Tianguistengo": [20.7804, -98.5236694],
      "Huehuetla": [20.4605527, -98.0690638],
      "Tulancingo de Bravo": [20.1261446, -98.343032],
      "Apan": [19.737189, -98.467989],
      "Chapantongo": [20.2727054, -99.476234],
      "Mixquiahuala de Juárez": [20.2086027, -99.177212],
      "Santiago de Anaya": [20.4034083, -98.97816945],
      "San Salvador": [20.319045, -99.0579583],
      "Huejutla de Reyes": [21.11740834, -98.44],
      "Tlanalapa": [19.8369498, -98.5881416],
      "Mineral del Monte": [20.1374832, -98.66432],
      "Omitlán de Juárez": [20.163989, -98.6304945],
      "Molango de Escamilla": [20.8396389, -98.7671945],
      "Tlanchinol": [21.0262942, -98.66269723],
      "Chapulhuacán": [21.1281194, -98.954767],
      "Xochicoatlán": [20.80025278, -98.6476168],
      "Zacualtipán de Ángeles": [20.64628056, -98.58423],
      "Acatlán": [20.1837, -98.4258945],
      "Cuautepec de Hinojosa": [20.017116, -98.26442],
      "San Agustín Metzquititlán": [20.5135835, -98.6256749],
      "Yahualica": [20.9177167, -98.38389167]
    };

    // Municipios con etiquetas NOMGEO
    fetch('Municipios.geojson')
      .then(res => res.json())
      .then(data => {
        municipiosLayer = L.geoJSON(data, { style: { color: "#525252", weight: 1.2, fillOpacity: 0 } }).addTo(map);
        L.geoJSON(data, {
          onEachFeature: function (feature, layer) {
            var label = getField({ properties: feature.properties }, "NOMGEO");
            if (!label) return;

            // Usa coordenadas personalizadas si existen
            var center;
            if (coordsPersonalizadas[label]) {
              center = L.latLng(coordsPersonalizadas[label][0], coordsPersonalizadas[label][1]);
            } else {
              center = layer.getBounds().getCenter();
            }

            L.marker(center, { pane: 'labels', interactive: false, icon: L.divIcon({ className: 'empty-icon' }) })
              .bindTooltip(String(label), { permanent: true, direction: "center", className: "mun-label" })
              .addTo(municipiosLabelLayer);
          },
          style: { opacity: 0, fillOpacity: 0 }
        });
      });

    // Regiones con etiquetas "Regiones"
    fetch('Regiones.geojson')
      .then(res => res.json())
      .then(data => {
        regionesLayer = L.geoJSON(data, { style: { color: "#000", weight: 2, fillOpacity: 0, dashArray: "1,6,1,6" } }).addTo(map);
        L.geoJSON(data, {
          onEachFeature: function (feature, layer) {
            var title = getField({ properties: feature.properties }, "Regiones");
            if (!title) return;
            var center = layer.getBounds ? layer.getBounds().getCenter() : null;
            if (!center) return;
            L.marker(center, { pane: 'labels', interactive: false, icon: L.divIcon({ className: 'empty-icon' }) })
              .bindTooltip(String(title), { permanent: true, direction: "center", className: "region-label" })
              .addTo(regionesLabelLayer);
          },
          style: { opacity: 0, fillOpacity: 0 }
        });
      });

    // Estado de Hidalgo
    fetch('Edo_Hgo.geojson')
      .then(res => res.json())
      .then(data => {
        edoLayer = L.geoJSON(data, { style: { color: "rgb(255,0,0)", weight: 3, fillOpacity: 0 } }).addTo(map);
      });

    // Cargar datasets de informes
    fetch('NAFIN.geojson').then(res => res.json()).then(data => { informesNAFINData = data; });
    fetch('Paso.geojson').then(res => res.json()).then(data => { informesPasoData = data; });

    // UI refs
    var legendDiv = document.getElementById('legend');
    var radios = document.getElementsByName('mapOption');

    // Menú desplegable
    document.getElementById('menuBtn').addEventListener('click', function () {
      var menu = document.getElementById('menuOptions');
      menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
    });

    // Limpieza unificada
    function limpiarInformes() {
      if (NAFIN1Layer) { map.removeLayer(NAFIN1Layer); NAFIN1Layer = null; }
      if (NAFIN2Layer) { map.removeLayer(NAFIN2Layer); NAFIN2Layer = null; }
      if (NAFIN3Layer) { map.removeLayer(NAFIN3Layer); NAFIN3Layer = null; }
      if (Paso1Layer) { map.removeLayer(Paso1Layer); Paso1Layer = null; }
      if (Paso2Layer) { map.removeLayer(Paso2Layer); Paso2Layer = null; }
      legendDiv.style.display = "none";
      legendDiv.innerHTML = "<strong>INVERSIÓN</strong>";
      document.getElementById('simbolos-panel').style.display = "none";
      document.getElementById("programTitle").textContent = "";
      document.getElementById("downloadBtn").disabled = true;
    }

    // Archivos de descarga
    var archivosPorPrograma = {
      "NAFIN1": "https://raw.githubusercontent.com/jorgeluisv756-svg/Tablas/e56c0269948e9528b564726e4402bb5cad1848f2/Impulso%20Inv%202023.pdf",
      "NAFIN2": "https://raw.githubusercontent.com/jorgeluisv756-svg/Tablas/e56c0269948e9528b564726e4402bb5cad1848f2/Impulso%20Inv%202024.pdf",
      "NAFIN3": "https://raw.githubusercontent.com/jorgeluisv756-svg/Tablas/e56c0269948e9528b564726e4402bb5cad1848f2/Impulso%20Inv%202025.pdf",
      "Paso1": "https://raw.githubusercontent.com/jorgeluisv756-svg/Tablas/95abb97b61d0397f84e4438fbae467837503da5a/Paso_Paso_EF_24.pdf",
      "Paso2": "https://raw.githubusercontent.com/jorgeluisv756-svg/Tablas/95abb97b61d0397f84e4438fbae467837503da5a/Paso_Paso_EF_25.pdf",
    };

    // Utilidades
    function toNumberSafe(x) {
      if (x === null || x === undefined) return NaN;
      var s = String(x).replace(/[,]/g, '').replace(/[^\d.\-]/g, '');
      var v = parseFloat(s);
      return isNaN(v) ? NaN : v;
    }

    function propsFromHtmlTable(properties) {
      var dict = {};
      for (var k in properties) {
        if (!properties.hasOwnProperty(k)) continue;
        var val = properties[k];
        if (typeof val !== 'string') dict[k] = val;
      }
      for (var key in properties) {
        if (!properties.hasOwnProperty(key)) continue;
        var html = properties[key];
        if (typeof html === 'string' && html.indexOf('<td') !== -1) {
          var container = document.createElement('div');
          container.innerHTML = html;
          var tds = container.querySelectorAll('td');
          for (var i = 0; i + 1 < tds.length; i += 2) {
            var name = tds[i].textContent.trim();
            var value = tds[i + 1].textContent.trim();
            dict[name] = value;
          }
        }
      }
      return dict;
    }

    function getField(f, fieldName) {
      if (f.properties && f.properties.hasOwnProperty(fieldName)) {
        return f.properties[fieldName];
      }
      var dict = propsFromHtmlTable(f.properties || {});
      return dict[fieldName];
    }

    // Estilos Estilos (NAFIN) 
    function estiloNAFIN1(valorNum) {
      var valor = toNumberSafe(valorNum);
      if (isNaN(valor) || valor === 0) return { fillColor: "rgb(204,204,204)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 1 && valor <= 2200000) return { fillColor: "rgb(255,182,171)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 2200001 && valor <= 9704000) return { fillColor: "rgb(250,131,110)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 9704001 && valor <= 38892400) return { fillColor: "rgb(237,57,33)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 38892401 && valor <= 105663500) return { fillColor: "rgb(230,0,0)", color: "#333", weight: 1, fillOpacity: 1 };
      else return { fillColor: "#ccc", color: "#333", weight: 1, fillOpacity: 1 };
    }
    function estiloNAFIN2(valorNum) {
      var valor = toNumberSafe(valorNum);
      if (isNaN(valor) || valor === 0) return { fillColor: "rgb(204,204,204)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 1 && valor <= 5000000) return { fillColor: "rgb(255,182,171)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 5000001 && valor <= 18500000) return { fillColor: "rgb(250,131,110)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 18500001 && valor <= 42068720) return { fillColor: "rgb(237,57,33)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 42068721 && valor <= 145163037) return { fillColor: "rgb(230,0,0)", color: "#333", weight: 1, fillOpacity: 1 };
      else return { fillColor: "#ccc", color: "#333", weight: 1, fillOpacity: 1 };
    }
    function estiloNAFIN3(valorNum) {
      var valor = toNumberSafe(valorNum);
      if (isNaN(valor) || valor === 0) return { fillColor: "rgb(204,204,204)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 1 && valor <= 2000000) return { fillColor: "rgb(255,182,171)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 2000001 && valor <= 5180000) return { fillColor: "rgb(250,131,110)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 5180001 && valor <= 19069600) return { fillColor: "rgb(237,57,33)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 19069601 && valor <= 90691097) return { fillColor: "rgb(230,0,0)", color: "#333", weight: 1, fillOpacity: 1 };
      else return { fillColor: "#ccc", color: "#333", weight: 1, fillOpacity: 1 };
    }
    function estiloPaso1(valorNum) {
      var valor = toNumberSafe(valorNum);
      if (isNaN(valor) || valor === 0) return { fillColor: "rgb(204,204,204)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 1 && valor <= 25000) return { fillColor: "rgb(222,184,135)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 25001 && valor <= 100000) return { fillColor: "rgb(193,130,67)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 100001 && valor <= 1075000) return { fillColor: "rgb(176,92,50)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 1075001 && valor <= 2175000) return { fillColor: "rgb(129,62,17)", color: "#333", weight: 1, fillOpacity: 1 };
      else return { fillColor: "#ccc", color: "#333", weight: 1, fillOpacity: 1 };
    }
    function estiloPaso2(valorNum) {
      var valor = toNumberSafe(valorNum);
      if (isNaN(valor) || valor === 0) return { fillColor: "rgb(204,204,204)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 1 && valor <= 50000) return { fillColor: "rgb(222,184,135)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 50001 && valor <= 100000) return { fillColor: "rgb(193,130,67)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 100001 && valor <= 200000) return { fillColor: "rgb(176,92,50)", color: "#333", weight: 1, fillOpacity: 1 };
      else if (valor >= 200001 && valor <= 475000) return { fillColor: "rgb(129,62,17)", color: "#333", weight: 1, fillOpacity: 1 };
      else return { fillColor: "#ccc", color: "#333", weight: 1, fillOpacity: 1 };
    }

    document.getElementById("downloadBtn").addEventListener("click", function () {
      var url = this.dataset.url;
      if (!url) return;
      const link = document.createElement('a');
      link.href = url;
      link.download = '';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    // Construcción de leyendas
    function buildLegend(items, title = "INVERSIÓN") {
      legendDiv.innerHTML = "<strong>" + title + "</strong>";
      items.forEach(s => {
        var row = document.createElement('div');
        var box = document.createElement('span');
        box.style.background = s.color;
        row.appendChild(box);
        row.appendChild(document.createTextNode(s.label));
        legendDiv.appendChild(row);
      });
      legendDiv.style.display = "block";
    }

    // Construcción de simbología dinámica (panel inferior izquierdo)
    function buildSimbolos(items) {
      var panel = document.getElementById('simbolos-panel');
      var content = document.getElementById('simbolos-content');
      content.innerHTML = "";
      items.forEach(s => {
        var row = document.createElement('div');
        row.className = "simbolo";
        var box = document.createElement('span');
        box.className = "box";
        box.style.borderColor = s.borderColor || "#000";
        box.style.background = s.fill || "none";
        row.appendChild(box);
        row.appendChild(document.createTextNode(s.label));
        content.appendChild(row);
      });
      panel.style.display = "block";
    }

    // Handler con toggle (reseleccionar limpia y regresa a base)
    Array.from(radios).forEach(radio => {
      radio.addEventListener('click', function (e) {
        var menu = document.getElementById('menuOptions');
        var programaSeleccionado = e.target.value;

        // Toggle: si clicas el mismo seleccionado, se limpia y regresa a base
        if (radio.checked && radio.dataset.selected === "true") {
          limpiarInformes();
          radio.checked = false;
          radio.dataset.selected = "false";
          menu.style.display = "none";
          // Traer base (regiones y estado) al frente, municipios atrás
          municipiosLayer && municipiosLayer.bringToBack();
          regionesLayer && regionesLayer.bringToFront();
          edoLayer && edoLayer.bringToFront();
          return;
        }

        // Marcar selección actual y cerrar el menú
        Array.from(radios).forEach(r => r.dataset.selected = "false");
        radio.dataset.selected = "true";
        menu.style.display = "none";

        // Limpia antes de dibujar
        limpiarInformes();

        // Casos de programas
        if (e.target.value === 'NAFIN1' && informesNAFINData) {
          NAFIN1Layer = L.geoJSON(informesNAFINData, {
            style: f => estiloNAFIN1(getField(f, "EF23_Inv"))
          }).addTo(map);

          municipiosLayer && municipiosLayer.bringToBack();
          NAFIN1Layer && NAFIN1Layer.bringToFront();
          regionesLayer && regionesLayer.bringToFront();
          edoLayer && edoLayer.bringToFront();

          buildLegend([
            { color: "rgb(204,204,204)", label: "Sin inversión" },
            { color: "rgb(255,182,171)", label: "$1 - $2,200,000 (4)" },
            { color: "rgb(250,131,110)", label: "$2,200,001 - $9,704,000 (3)" },
            { color: "rgb(237,57,33)", label: "$9,704,001 - $38,892,400 (1)" },
            { color: "rgb(230,0,0)", label: "$38,892,401 - $105,663,500 (1)" }
          ], "INVERSIÓN");
          buildSimbolos([
            { borderColor: "#999", label: "Municipio" },
            { borderColor: "#000", label: "Región" },
            { borderColor: "rgb(255,0,0)", label: "Estado de Hidalgo" }
          ]);
          document.getElementById("programTitle").textContent = "Impluso NAFIN +HIDALGO Ejercicio Fiscal 2023 Inversión";

          // habilitar botón de descarga para este programa
          var downloadBtn = document.getElementById("downloadBtn");
          downloadBtn.disabled = false;
          downloadBtn.dataset.url = archivosPorPrograma["NAFIN1"];

        } else if (e.target.value === 'NAFIN2' && informesNAFINData) {
          NAFIN2Layer = L.geoJSON(informesNAFINData, {
            style: f => estiloNAFIN2(getField(f, "EF24_Inv"))
          }).addTo(map);

          municipiosLayer && municipiosLayer.bringToBack();
          NAFIN2Layer && NAFIN2Layer.bringToFront();
          regionesLayer && regionesLayer.bringToFront();
          edoLayer && edoLayer.bringToFront();

          buildLegend([
            { color: "rgb(204,204,204)", label: "Sin inversión" },
            { color: "rgb(255,182,171)", label: "$1 - $5,000,000 (5)" },
