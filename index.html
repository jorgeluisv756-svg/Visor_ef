<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema</title>
    <style>
        body {
            font-family: Montserrat, sans-serif;
            background: #f4f4f4;
            margin: 0;
        }

        .header {
            background: #f4f4f4;
            padding: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .header img {
            width: 320px;
            max-width: 90%;
            margin: auto;
            display: block;
            margin-top: 15px;
        }

        .login-box {
            background: white;
            padding: 30px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            width: 320px;
            margin: 40px auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;   /* centra verticalmente el contenido */
            align-items: center; 
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #621132;
        }

        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            display: block;
        }

        .login-box button {
            width: 90%;
            padding: 10px;
            background: #8b2d2d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            margin-bottom: 10px; 
        }

        .login-box button:hover {
            background: #6e2222;
        }
    </style>
</head>

<body>
    <!-- Encabezado institucional -->
    <div class="header">
        <img src="https://raw.githubusercontent.com/jorgeluisv756-svg/imagenes_kmz/7c7924c0d0c89c5adaf112d1b8e3fb9db3258400/Logotipo%20armas30%20(1).png"
            alt="Logo Secretaría">
        <h3><br>Sistema de Información Económica</h3>
    </div>

    <!-- Caja de login -->
    <div class="login-box">
        <h2>Acceso al Sistema</h2>
        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button type="submit">Ingresar</button>
        </form>
    </div>

    <script src="usuarios.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            let usuario = document.getElementById("usuario").value;
            let password = document.getElementById("password").value;

            let encontrado = usuariosPermitidos.find(u => u.usuario === usuario && u.password === password);

            if (encontrado) {
                localStorage.setItem("bienvenida", `Bienvenido, ${encontrado.area}`);
                window.location.href = "menu.html";
            } else {
                alert("Credenciales incorrectas");
            }
        });
    </script>
</body>

</html>
